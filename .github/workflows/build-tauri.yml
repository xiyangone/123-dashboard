name: build-tauri

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build-tauri.yml'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install backend deps + PyInstaller
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build uvicorn-app sidecar (PyInstaller)
        working-directory: backend
        run: pyinstaller uvicorn-app.spec --noconfirm --clean

      - name: Place sidecar with Tauri target triple
        shell: pwsh
        run: |
          $binDir = "frontend/src-tauri/bin"
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          $target = "x86_64-pc-windows-msvc"
          Copy-Item "backend/dist/uvicorn-app.exe" "$binDir/uvicorn-app-$target.exe" -Force
          Get-ChildItem $binDir

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: npm install
        working-directory: frontend
        run: npm install

      - name: Setup Rust (stable + msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: tauri build
        working-directory: frontend
        run: npm run tauri build

      - name: Collect portable exe + sidecar (zip)
        shell: pwsh
        run: |
          $out = "dist-release"
          $portable = "$out/portable"
          New-Item -ItemType Directory -Force -Path $portable | Out-Null

          $exe = "frontend/src-tauri/target/release/dashboard-tauri.exe"
          $sidecar = "frontend/src-tauri/bin/uvicorn-app-x86_64-pc-windows-msvc.exe"
          if (-not (Test-Path $exe))     { throw "missing main exe: $exe" }
          if (-not (Test-Path $sidecar)) { throw "missing sidecar: $sidecar" }

          Copy-Item $exe     "$portable/dashboard-tauri.exe" -Force
          Copy-Item $sidecar "$portable/uvicorn-app-x86_64-pc-windows-msvc.exe" -Force

          Compress-Archive -Path "$portable/*" -DestinationPath "$out/dashboard-portable.zip" -Force
          Remove-Item $portable -Recurse -Force

          # NSIS setup.exe 作为备用（愿意装的人用）
          $nsis = "frontend/src-tauri/target/release/bundle/nsis"
          if (Test-Path $nsis) { Copy-Item "$nsis/*.exe" $out -Force }

          Get-ChildItem $out

      - name: Upload portable + installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: dist-release/**
          if-no-files-found: error
          retention-days: 14
